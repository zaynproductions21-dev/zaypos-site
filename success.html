<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Subscription Active — ZayPOS</title>
<link rel="icon" href="/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9fc;font-family:'Plus Jakarta Sans',Helvetica,Arial,sans-serif}
.card{text-align:center;max-width:480px;padding:40px 24px}
.icon{width:72px;height:72px;border-radius:50%;background:#f0fdf4;border:2px solid #bbf7d0;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
h1{font-size:26px;font-weight:800;color:#0f172a;margin-bottom:12px;letter-spacing:-0.5px}
p{font-size:16px;color:#64748b;line-height:1.7;margin-bottom:32px}
.btn{display:inline-block;background:#059669;color:#fff;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none}
.btn:hover{background:#047857}
.note{font-size:13px;color:#94a3b8;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Your subscription is active</h1>
  <p>Welcome to ZayPOS. Your account is ready — log in to start taking orders.</p>
  <a href="https://app.zaypos.co.uk" class="btn">Open ZayPOS →</a>
  <p class="note">A confirmation email is on its way.</p>
</div>
</body>
</html>
